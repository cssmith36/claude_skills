name: Auto-merge digest branches
on:
  push:
    branches:
      - 'claude/**'
permissions:
  contents: write
  pull-requests: write
jobs:
  open-and-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Open PR and squash-merge
        env:
          BRANCH: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR_URL=$(gh pr create --base main --head "$BRANCH" \
            --title "$BRANCH" \
            --body "Automated digest branch from Claude Code routine." 2>/dev/null || \
            gh pr list --head "$BRANCH" --json url --jq '.[0].url')
          gh pr merge --squash --delete-branch --admin "$PR_URL"
